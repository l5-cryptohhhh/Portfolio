<!DOCTYPE html>
<html lang="it" class="no-js">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Progetti — Manuel Nunziata</title>
    <meta name="description" content="Tutti i progetti di Manuel Nunziata, full-stack AI developer.">
    <link rel="icon"
        href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%2315141b'/%3E%3Ccircle cx='16' cy='16' r='6' fill='%23fb7a5b'/%3E%3C/svg%3E">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="assets/css/style.css?v=2">
    <script>
        document.documentElement.classList.remove('no-js');
        document.documentElement.classList.add('js');
    </script>
</head>

<body>
    <nav class="nav">
        <div class="wrap nav-inner">
            <a href="index.html" class="brand"><span class="dot"></span>Manuel Nunziata</a>
            <ul id="nav-menu">
                <li><a href="index.html#chi-sono">Chi sono</a></li>
                <li><a href="index.html#competenze">Competenze</a></li>
                <li><a href="index.html#esperienze">Percorso</a></li>
                <li><a href="index.html#contatti">Contatti</a></li>
            </ul>
        </div>
    </nav>

    <main>
        <section id="progetti">
            <div class="wrap">
                <div class="projects-head">
                    <div class="sec-head" data-reveal>
                        <h2>Tutti i progetti.</h2>
                        <p>Aggiungi, rimuovi e collega i tuoi lavori. Salvati nel tuo browser.</p>
                    </div>
                    <a href="index.html" class="btn btn-ghost btn-sm" data-reveal><i class="bi bi-arrow-left"></i>
                        Torna alla home</a>
                </div>
                <div class="project-grid" data-projects></div>
            </div>
        </section>
    </main>

    <!-- Modale nuovo progetto -->
    <div id="project-modal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="project-modal-title"
        aria-hidden="true">
        <div class="modal-box">
            <div class="modal-header">
                <h3 id="project-modal-title">Nuovo progetto</h3>
                <button id="close-project-btn" type="button" aria-label="Chiudi"><i class="bi bi-x-lg"></i></button>
            </div>
            <p class="modal-sub">Il link aprirà il progetto in una nuova scheda.</p>
            <form id="project-form" novalidate>
                <label for="proj-title">Titolo *</label>
                <input type="text" id="proj-title" name="title" placeholder="Es. Dashboard meteo" required
                    maxlength="60">
                <p class="field-error" data-error-for="proj-title"></p>

                <label for="proj-tag">Etichetta</label>
                <input type="text" id="proj-tag" name="tag" placeholder="Es. React · API" maxlength="24">

                <label for="proj-desc">Descrizione</label>
                <textarea id="proj-desc" name="desc" rows="3" placeholder="Cosa fa e con cosa l'hai costruito"
                    maxlength="220"></textarea>

                <label for="proj-link">Link al progetto *</label>
                <input type="url" id="proj-link" name="link" placeholder="https://..." required>
                <p class="field-error" data-error-for="proj-link"></p>

                <div class="modal-actions">
                    <button type="button" id="annulla-project-btn" class="btn btn-ghost">Annulla</button>
                    <button type="submit" class="btn btn-primary"><i class="bi bi-plus-lg"></i>Aggiungi</button>
                </div>
            </form>
        </div>
    </div>

    <footer>
        <div class="wrap footer-inner">
            <p>&copy; 2026 Manuel Nunziata — Full-Stack AI Developer</p>
            <span class="footer-icons">
                <a href="https://www.linkedin.com/in/manuel-nunziata-800494372/" target="_blank" rel="noopener"
                    aria-label="LinkedIn"><i class="bi bi-linkedin"></i></a>
                <a href="https://github.com/l5-cryptohhhh" target="_blank" rel="noopener" aria-label="GitHub"><i
                        class="bi bi-github"></i></a>
                <a href="mailto:nunziatamanuel5@gmail.com" aria-label="Email"><i class="bi bi-envelope"></i></a>
            </span>
        </div>
    </footer>

    <script src="assets/js/script.js?v=2" defer></script>
</body>

</html>
